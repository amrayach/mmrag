server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve the gallery as the index page
    location = / {
        try_files /gallery.html =404;
    }

    # JSON file listing endpoint for the gallery JS
    location /api/files {
        autoindex on;
        autoindex_format json;
        alias /usr/share/nginx/html/;
    }

    # Serve processed PDFs (read-only, for source links in chat)
    location /pdf/ {
        alias /usr/share/nginx/pdf/;
        types { application/pdf pdf; }
        add_header Content-Disposition 'inline';
    }

    # Serve static assets normally
    location / {
        try_files $uri $uri/ =404;
    }
}
