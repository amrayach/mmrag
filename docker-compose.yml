name: ammer-mmragv2

services:
  postgres:
    image: supabase/postgres:15.14.1.081
    container_name: ammer_mmragv2_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:${PORT_PG}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.102.0
    container_name: ammer_mmragv2_n8n
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: "false"

      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: "postgres"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "${N8N_DB}"
      DB_POSTGRESDB_USER: "${POSTGRES_USER}"
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_PASSWORD}"

      # REQUIRED for workflows that reference $env.*
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_TEXT_MODEL: ${OLLAMA_TEXT_MODEL}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      PUBLIC_ASSETS_BASE_URL: ${PUBLIC_ASSETS_BASE_URL}
      VECTOR_DISTANCE_THRESHOLD: "0.6"

    ports:
      - "127.0.0.1:${PORT_N8N}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.23.1
    container_name: ammer_mmragv2_ollama
    environment:
      # Demo-performance mode: give one live answer the full GB10 path, keep all
      # production models resident, and fail prewarm if Ollama falls back to CPU.
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "3"
      OLLAMA_KEEP_ALIVE: "1h"
      OLLAMA_CONTEXT_LENGTH: "4096"
      OLLAMA_GPU_OVERHEAD: "0"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
      OLLAMA_LLM_LIBRARY: "cuda_v13"
      OLLAMA_NEW_ENGINE: "false"
      OLLAMA_FLASH_ATTENTION: "true"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    restart: unless-stopped

  rag-gateway:
    build:
      context: ./services/rag-gateway
      dockerfile: Dockerfile
    container_name: ammer_mmragv2_rag_gateway
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      # Context mode: "direct" (postgres+ollama) or "n8n" (webhook fallback)
      CONTEXT_MODE: "direct"
      # Direct mode: database connection
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${RAG_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      PUBLIC_ASSETS_BASE_URL: ${PUBLIC_ASSETS_BASE_URL}
      VECTOR_DISTANCE_THRESHOLD: "0.6"
      # n8n mode (fallback)
      N8N_CHAT_WEBHOOK_URL: ${N8N_CHAT_WEBHOOK_URL}
      # Shared
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      REQUEST_TIMEOUT_SECS: "120"
      DEFAULT_MODEL: ${OLLAMA_TEXT_MODEL}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
      RAG_DEMO_RATE_LIMIT_ENABLED: ${RAG_DEMO_RATE_LIMIT_ENABLED:-false}
      RAG_DEMO_MAX_QUERIES_PER_HOUR: ${RAG_DEMO_MAX_QUERIES_PER_HOUR:-10}
      # Phase 0 retrieval diagnostics — no JSONL writes when off.
      RAG_TRACE: ${RAG_TRACE:-false}
      RAG_TRACE_PATH: ${RAG_TRACE_PATH:-/data/rag-traces/retrieval.jsonl}
    volumes:
      # Host-visible retrieval-trace directory; only written when RAG_TRACE=true.
      - ./data/rag-traces:/data/rag-traces
    ports:
      - "127.0.0.1:56155:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  pdf-ingest:
    build:
      context: ./services/pdf-ingest
      dockerfile: Dockerfile
    container_name: ammer_mmragv2_pdf_ingest
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${RAG_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}

      INBOX_DIR: /kb/inbox
      PROCESSED_DIR: /kb/processed
      ASSETS_DIR: /kb/assets

      # strict single-worker ingestion (lock)
      LOCK_FILE: /tmp/pdf_ingest.lock

      MAX_DOCS_PER_SCAN: "1"
      MAX_PAGES: "0"
      MAX_IMAGES_PER_PAGE: "5"
      CHUNK_CHARS: "1500"
      CHUNK_OVERLAP_CHARS: "200"
      OPENDATALOADER_MAX_PARALLEL: "1"
      OPENDATALOADER_TIMEOUT: "300"
      OPENDATALOADER_TMP_DIR: "/tmp/odl"
      OPENDATALOADER_JAVA_OPTS: "-Xmx2g"
    volumes:
      - ./data/inbox:/kb/inbox
      - ./data/processed:/kb/processed
      - ./data/assets:/kb/assets
      - ./data/error:/kb/error
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  rss-ingest:
    build:
      context: ./services/rss-ingest
      dockerfile: Dockerfile
    container_name: ammer_mmragv2_rss_ingest
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${RAG_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL}
      ASSETS_DIR: /kb/assets
      LOCK_FILE: /tmp/rss_ingest.lock
      MAX_ARTICLES_PER_FEED: "20"
      MAX_ARTICLES_PER_RUN: "50"
      CAPTION_IMAGES: "true"
      CHUNK_CHARS: "1500"
      CHUNK_OVERLAP_CHARS: "200"
      FETCH_DELAY_SECS: "2.0"
      RSS_FEEDS_ENABLED: "all"
    volumes:
      - ./data/assets:/kb/assets
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui@sha256:a7e4796ae894d1e2a0c1824860ade472f35c507608a01c3581377b5c19b0ed49
    container_name: ammer_mmragv2_openwebui
    depends_on:
      rag-gateway:
        condition: service_started
    environment:
      WEBUI_NAME: "MMRAG Demo (Tailnet Only)"
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: ${WEBUI_AUTH_TRUSTED_EMAIL_HEADER:-X-Demo-Email}
      WEBUI_AUTH_TRUSTED_NAME_HEADER: ${WEBUI_AUTH_TRUSTED_NAME_HEADER:-X-Demo-Name}
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY}"
      ENABLE_FORWARD_USER_INFO_HEADERS: ${ENABLE_FORWARD_USER_INFO_HEADERS:-true}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
    ports:
      - "127.0.0.1:${PORT_OPENWEBUI}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    restart: unless-stopped

  filebrowser:
    image: filebrowser/filebrowser:v2.57.1
    container_name: ammer_mmragv2_filebrowser
    ports:
      - "127.0.0.1:${PORT_FILEBROWSER}:80"
    volumes:
      - ./data:/srv
      - filebrowser_db:/database
      - filebrowser_config:/config
    command: ["--database", "/database/filebrowser.db", "--root", "/srv", "--port", "80", "--address", "0.0.0.0"]
    restart: unless-stopped

  adminer:
    image: adminer:5.4.2
    container_name: ammer_mmragv2_adminer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "127.0.0.1:${PORT_ADMINER}:8080"
    restart: unless-stopped

  controlcenter:
    build:
      context: ./services/controlcenter
      dockerfile: Dockerfile
    container_name: ammer_mmragv2_controlcenter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${RAG_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_TEXT_MODEL: ${OLLAMA_TEXT_MODEL}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      N8N_CHAT_WEBHOOK_URL: ${N8N_CHAT_WEBHOOK_URL}
      PUBLIC_ASSETS_BASE_URL: ${PUBLIC_ASSETS_BASE_URL}
      TAILNET_HOST: ${TAILSCALE_HOSTNAME}
    ports:
      - "127.0.0.1:${PORT_CONTROLCENTER}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docs:/app/project-docs/docs:ro
      - ./README.md:/app/project-docs/README.md:ro
      - ./MANUAL_STEPS.md:/app/project-docs/MANUAL_STEPS.md:ro
      - ./data:/app/project-data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  demo-site:
    build:
      context: ./demo-site
      dockerfile: Dockerfile
    container_name: ammer_mmragv2_demo_site
    depends_on:
      rag-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: "3000"
      RAG_GATEWAY_URL: ${RAG_GATEWAY_URL:-http://rag-gateway:8000}
      DEMO_SITE_MODEL: ${DEMO_SITE_MODEL:-gemma4:26b}
      DEMO_SITE_ADMIN_TOKEN: ${DEMO_SITE_ADMIN_TOKEN:-}
      DEMO_SITE_AUTH_STORE_PATH: ${DEMO_SITE_AUTH_STORE_PATH:-/app/data/auth.json}
      DEMO_SITE_CODE_TTL_HOURS: ${DEMO_SITE_CODE_TTL_HOURS:-24}
      DEMO_SITE_SESSION_TTL_HOURS: ${DEMO_SITE_SESSION_TTL_HOURS:-24}
      DEMO_SITE_TOKEN_TTL_SECONDS: ${DEMO_SITE_TOKEN_TTL_SECONDS:-86400}
      DEMO_SITE_MAX_QUERIES_PER_HOUR: ${DEMO_SITE_MAX_QUERIES_PER_HOUR:-10}
      DEMO_SITE_CHAT_TIMEOUT_MS: ${DEMO_SITE_CHAT_TIMEOUT_MS:-60000}
      DEMO_SITE_OPENWEBUI_ENABLED: ${DEMO_SITE_OPENWEBUI_ENABLED:-false}
      OPENWEBUI_URL: ${OPENWEBUI_URL:-http://openwebui:8080}
      OPENWEBUI_ADMIN_EMAIL: ${OPENWEBUI_ADMIN_EMAIL:-}
      OPENWEBUI_ADMIN_PASSWORD: ${OPENWEBUI_ADMIN_PASSWORD:-}
      OPENWEBUI_TRUSTED_EMAIL_HEADER: ${OPENWEBUI_TRUSTED_EMAIL_HEADER:-X-Demo-Email}
      OPENWEBUI_TRUSTED_NAME_HEADER: ${OPENWEBUI_TRUSTED_NAME_HEADER:-X-Demo-Name}
    ports:
      - "127.0.0.1:${PORT_DEMO_SITE:-56158}:3000"
    volumes:
      - demo_site_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  assets:
    image: nginx:1.29-alpine
    container_name: ammer_mmragv2_assets
    ports:
      - "127.0.0.1:${PORT_ASSETS}:80"
    volumes:
      - ./data/assets:/usr/share/nginx/html:ro
      - ./data/processed:/usr/share/nginx/pdf:ro
      - ./nginx/assets.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  ollama_data:
  openwebui_data:
  filebrowser_db:
  filebrowser_config:
  demo_site_data:
